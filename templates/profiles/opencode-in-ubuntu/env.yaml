# Cache-preserving env config – OpenCode CLI agent.

# Command launched automatically when `psbx up` opens the sandbox shell.
# Pass --shell to bypass this and drop into a plain shell instead.
defaultCmd: opencode

# Host directories mounted read-only into the VM at /mnt/host-config/<name>
# and copied to guestTarget during provisioning.
#   source             - Profile-relative path to the host directory.
#   name               - Segment appended to the /mnt/host-config/ mount prefix.
#   guestTarget        - Destination path inside the VM after provisioning.
#   sessions.workspacePath  - Workspace-relative dir for persistent session data; survives VM rebuilds.
#   sessions.guestSymlink  - Symlink placed inside the VM pointing to sessions.workspacePath.
#   exfiltrateExcludes - Paths skipped when copying config back via `init --from-vm`.
#   driftDetectionExcludes - Paths skipped when hashing mount contents for drift detection.
#                           Useful for large generated trees (e.g. node_modules) that would
#                           otherwise slow down `psbx status` and `psbx up`.
configMounts:
  # OpenCode configuration (opencode.json, MCP servers, etc.)
  # See: https://opencode.ai/docs/config/
  - source: opencode
    name: opencode
    guestTarget: ~/.config/opencode
    sessions:
      workspacePath: .agents/opencode-sessions/opencode.db
      guestSymlink: ~/.local/share/opencode/opencode.db
    exfiltrateExcludes:
      - sessions
      - logs

# Host environment variables forwarded into the VM shell; all others are blocked.
# Typical entries are API tokens required by the agent or its MCP servers.
shellEnvAllowlist:
  # - ANTHROPIC_API_KEY
  # - OPENAI_API_KEY
  # - SOME_OTHER_API_TOKEN
