# Environment and mount configuration for the GitHub Copilot CLI in Ubuntu.
#
# Each configMount entry maps a profile subdirectory into the VM at
# /mnt/host-config/<name> (read-only) and is copied to the guest target path
# during provisioning.
#
# For the Copilot CLI config directory layout, see:
#   https://docs.github.com/en/copilot/reference/copilot-cli-reference/cli-config-dir-reference

# Default command run by `psbx up` when entering the sandbox shell.
# Use `psbx up --shell` to skip the default and open a plain shell.
defaultCmd: copilot

configMounts:
  # GitHub Copilot CLI configuration (settings, mcp-config, agents, etc.)
  # Session state is redirected to the project workspace so it survives VM
  # rebuilds. Ephemeral data (logs, IDE state, session-store DB) is excluded
  # when exfiltrating config back to the host via `init --from-vm`.
  - source: copilot
    name: copilot
    guestTarget: ~/.copilot
    projectSessionDir: .agents/copilot-sessions
    exfiltrateExcludes:
      - session-state
      - session-store.db
      - logs
      - ide

# Host environment variables forwarded into the VM shell.
# All other host variables are blocked.
shellEnvAllowlist:
  # - COPILOT_GH_HOST
  # - COPILOT_GITHUB_TOKEN
