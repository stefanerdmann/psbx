# Cache-preserving env config – GitHub Copilot CLI agent.

# Command launched automatically when `psbx up` opens the sandbox shell.
# Pass --shell to bypass this and drop into a plain shell instead.
defaultCmd: copilot

# Host directories mounted read-only into the VM at /mnt/host-config/<name>
# and copied to guestTarget during provisioning.
#   source             - Profile-relative path to the host directory.
#   name               - Segment appended to the /mnt/host-config/ mount prefix.
#   guestTarget        - Destination path inside the VM after provisioning.
#   projectSessionDir  - Workspace-relative dir for persistent session data; survives VM rebuilds.
#   sessionSymlink     - Symlink placed inside the VM pointing to projectSessionDir.
#   exfiltrateExcludes - Paths skipped when copying config back via `init --from-vm`.
configMounts:
  # GitHub Copilot CLI configuration (settings, mcp-config, agents, etc.)
  # See: https://docs.github.com/en/copilot/reference/copilot-cli-reference/cli-config-dir-reference
  - source: copilot
    name: copilot
    guestTarget: ~/.copilot
    projectSessionDir: .agents/copilot-sessions/session-state
    sessionSymlink: ~/.copilot/session-state
    exfiltrateExcludes:
      - session-state
      - session-store.db
      - logs
      - ide

# Host environment variables forwarded into the VM shell; all others are blocked.
# Typical entries are API tokens required by the agent or its MCP servers.
shellEnvAllowlist:
  # - COPILOT_GH_HOST
  # - COPILOT_GITHUB_TOKEN
  # - SOME_OTHER_API_TOKEN
