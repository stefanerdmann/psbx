# Environment and mount configuration for this profile.
#
# configMounts: Directories from this profile that are mounted read-only into
#   the VM and copied to the guest during provisioning.
#
#   source            - Profile-relative path to the host directory.
#   name              - Mount-point segment: mounted at /mnt/host-config/<name>.
#   guestTarget       - Where provisioning copies the contents inside the VM.
#   projectSessionDir - (optional) Workspace-relative dir created in the project
#                       for persistent session data.
#
# shellEnvAllowlist: Host environment variables forwarded into the VM shell.
#   All other host variables are blocked. Typical entries are API tokens needed
#   by the agent or MCP servers.

# Default command run by `psbx up` when entering the sandbox shell.
# Use `psbx up --shell` to skip the default and open a plain shell.
defaultCmd: pi

configMounts:
  - source: pi/agent
    name: agent
    guestTarget: ~/.pi/agent
    projectSessionDir: .agents/sessions

# shellEnvAllowlist:
#   - GHE_MCP_TOKEN
#   - GITHUB_MCP_TOKEN
