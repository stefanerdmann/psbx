# Self-test profile: lightweight Alpine VM used by the test suite.
# No host environment variables are forwarded by default.

configMounts:
  - source: pi/agent
    name: agent
    guestTarget: ~/.pi/agent

sessions:
  - workspacePath: .agents/sessions/

# Workdir subdirectories shadowed by guest-local bind-mounts.
# Prevents architecture mismatches and cross-filesystem hardlink errors.
shadowPaths:
  - node_modules
